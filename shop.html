<!DOCTYPE html>
<!--

<html lang="en">

    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Poppins:wght@300;400;600&display=swap"

    <title>Shop | cherry Nails</title>

<body class="shop-page">
    <!-- NAVIGATION BAR (Synced with index.html) -->
    <nav>
        <a href="index.html" style="text-decoration: none; color: inherit;">
            <div class="logo">
                <span class="logo-main">cherry</span>
                <span class="logo-sub">Dnails</span>
            </div>

        <ul class="links">

            <li><a href="shop.html">Shop</a></li>
            <li><a href="#">About</a></li>
